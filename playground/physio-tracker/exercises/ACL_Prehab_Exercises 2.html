<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACL Prehab Exercises</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e8dcc8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 24px 16px;
    min-height: 100vh;
  }
  .container { max-width: 520px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12);
    background: transparent; color: #888; font-size: 12px; cursor: pointer;
    font-family: inherit; font-weight: 500; transition: all 0.2s;
  }
  .filter-btn.active {
    border-color: rgba(255,140,60,0.5); background: rgba(255,140,60,0.15); color: #ff8c3c;
  }
  .exercises { display: flex; flex-direction: column; gap: 12px; }
  .card {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.3s ease;
  }
  .card.active {
    background: rgba(255,255,255,0.06); border-color: rgba(255,140,60,0.4);
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .card-header h3 { font-size: 15px; color: #e8dcc8; font-weight: 500; }
  .phase-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px; font-family: monospace; font-weight: 600;
  }
  .canvas-wrap {
    display: flex; justify-content: center; background: rgba(0,0,0,0.3);
    border-radius: 8px; padding: 8px; margin-bottom: 10px;
  }
  .meta { display: flex; gap: 12px; margin-bottom: 8px; }
  .meta span { font-size: 12px; color: #aaa; font-family: monospace; }
  .meta .sep { color: #777; }
  .tip {
    font-size: 12px; color: rgba(255,140,60,0.8); font-style: italic;
    line-height: 1.4; display: none;
  }
  .card.active .tip { display: block; }
  .footer {
    font-size: 11px; color: #555; margin-top: 24px; text-align: center; line-height: 1.5;
  }
</style>
</head>
<body>
<div class="container">
  <h1>ACL Prehab Exercises</h1>
  <p class="subtitle">Tap an exercise to animate · Orange highlights show target muscles</p>
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="2">Phase 2</button>
    <button class="filter-btn" data-filter="3">Phase 3</button>
    <button class="filter-btn" data-filter="daily">Daily</button>
  </div>
  <div class="exercises" id="exercises"></div>
  <p class="footer">Always clear exercises with your physiotherapist before starting.<br>Stop if you feel sharp pain or significant swelling.</p>
</div>

<script>
const exercises = [
  { id:"quad-sets", name:"Quad Sets", phase:2, sets:"3 × 15 reps", freq:"1× daily",
    tip:"Press knee firmly into the floor. You should see your kneecap move upward.",
    animate(ctx,t,w,h){
      const ground=h*.75, hipX=w/2-40, hipY=ground-10;
      const torsoA=-0.3, shX=hipX+Math.sin(torsoA)*80, shY=hipY-Math.cos(torsoA)*80;
      const hdX=shX+Math.sin(torsoA)*25, hdY=shY-25;
      const cycle=(Math.sin(t*2)+1)/2, kp=cycle*3;
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=4;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(shX,shY);ctx.lineTo(hipX-30,hipY-30);ctx.lineTo(hipX-45,ground-5);ctx.stroke();
      ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(hipX,hipY);ctx.lineTo(shX,shY);ctx.stroke();
      const knX=hipX+55,knY=ground-5-kp,anX=knX+60,anY=ground-3;
      ctx.beginPath();ctx.moveTo(hipX,hipY);ctx.lineTo(knX,knY);ctx.lineTo(anX,anY);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(anX,anY);ctx.lineTo(anX+15,anY-5);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(hdX,hdY,14,0,Math.PI*2);ctx.fill();
      if(cycle>.3){ctx.strokeStyle=`rgba(255,140,60,${cycle*.7})`;ctx.lineWidth=8;ctx.beginPath();ctx.moveTo(hipX+15,hipY+2);ctx.lineTo(knX-5,knY+2);ctx.stroke();}
      if(cycle>.5){ctx.strokeStyle=`rgba(255,140,60,${(cycle-.5)*2})`;ctx.fillStyle=ctx.strokeStyle;ctx.lineWidth=2;const ay=knY+12;ctx.beginPath();ctx.moveTo(knX,ay);ctx.lineTo(knX,ay+12);ctx.stroke();ctx.beginPath();ctx.moveTo(knX-5,ay+8);ctx.lineTo(knX,ay+14);ctx.lineTo(knX+5,ay+8);ctx.fill();}
    }},
  { id:"heel-slides", name:"Heel Slides", phase:2, sets:"3 × 15 reps", freq:"1× daily",
    tip:"Slide slowly and hold at end range for 5 seconds.",
    animate(ctx,t,w,h){
      const cx=w/2,ground=h*.75,cycle=(Math.sin(t*1.5)+1)/2;
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      const hdX=cx-80,hdY=ground-18,shX=cx-55,shY=ground-8,hiX=cx+10,hiY=ground-5;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(shX,shY);ctx.lineTo(hiX,hiY);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(shX,shY);ctx.lineTo(shX+5,ground-3);ctx.stroke();
      const kb=cycle*1.1,tl=55,sl=50;
      const knX=hiX+Math.cos(kb+.1)*tl,knY=hiY-Math.sin(kb+.1)*tl;
      const anX=knX+Math.cos(kb*.8)*sl,anY=Math.min(knY+Math.sin(kb*.5)*sl,ground-3);
      ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(hiX,hiY);ctx.lineTo(knX,knY);ctx.lineTo(anX,anY);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(anX,anY);ctx.lineTo(anX+12,anY-3);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(hdX,hdY,14,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="rgba(255,140,60,0.6)";ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(hiX+65,ground+10);ctx.lineTo(hiX+25,ground+10);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle="rgba(255,140,60,0.6)";ctx.beginPath();ctx.moveTo(hiX+28,ground+6);ctx.lineTo(hiX+22,ground+10);ctx.lineTo(hiX+28,ground+14);ctx.fill();
    }},
  { id:"slr", name:"Straight Leg Raises", phase:2, sets:"3 × 12 each direction", freq:"1× daily",
    tip:"Tighten the quad first, then lift. Keep the knee locked straight.",
    animate(ctx,t,w,h){
      const cx=w/2,ground=h*.75,lift=Math.max(0,Math.sin(t*1.8))*.55;
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      const hdX=cx-80,hdY=ground-18,shX=cx-55,shY=ground-8,hiX=cx+10,hiY=ground-5;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(shX,shY);ctx.lineTo(hiX,hiY);ctx.stroke();
      ctx.lineWidth=4;ctx.strokeStyle="#b0a898";ctx.beginPath();ctx.moveTo(hiX,hiY);ctx.lineTo(hiX+95,ground-3);ctx.stroke();
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;const ll=100,anX=hiX+Math.cos(lift)*ll,anY=hiY-Math.sin(lift)*ll;
      ctx.beginPath();ctx.moveTo(hiX,hiY);ctx.lineTo(anX,anY);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(anX,anY);ctx.lineTo(anX+10,anY-8);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(hdX,hdY,14,0,Math.PI*2);ctx.fill();
      if(lift>.1){ctx.strokeStyle=`rgba(255,140,60,${lift})`;ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(hiX,hiY,35,0,-lift,true);ctx.stroke();ctx.setLineDash([]);}
    }},
  { id:"wall-sits", name:"Wall Sits", phase:2, sets:"3 × 20–30 sec", freq:"1× daily",
    tip:"Start shallow (~30°). Keep back flat against wall, weight through heels.",
    animate(ctx,t,w,h){
      const ground=h*.78,wallX=w/2-30,br=Math.sin(t*2)*1.5;
      ctx.strokeStyle="#555";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(wallX,ground-150);ctx.lineTo(wallX,ground);ctx.stroke();
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      const bx=wallX+3,hy=ground-50+br,sy=hy-65,hdy=sy-28,kx=bx+55,ky=hy+5,ax=kx+5,ay=ground-3;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(bx,hy);ctx.lineTo(bx,sy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx,hy);ctx.lineTo(kx,ky);ctx.stroke();
      ctx.beginPath();ctx.moveTo(kx,ky);ctx.lineTo(ax,ay);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+18,ay);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(bx+5,sy+5);ctx.lineTo(bx+15,hy-5);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(bx+5,hdy,14,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="rgba(255,140,60,0.5)";ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(kx,ky,20,Math.PI*.5,Math.PI*1.1);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle="rgba(255,140,60,0.7)";ctx.font="11px monospace";ctx.fillText("~30°",kx-35,ky+5);
    }},
  { id:"glute-bridges", name:"Glute Bridges", phase:2, sets:"3 × 15 reps", freq:"1× daily",
    tip:"Squeeze glutes at top. Hold 3 seconds. Don't hyperextend the back.",
    animate(ctx,t,w,h){
      const cx=w/2,ground=h*.78,lift=Math.max(0,Math.sin(t*1.6))*30;
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      const shX=cx-50,shY=ground-8,hiX=cx+5,hiY=ground-8-lift,knX=cx+45,knY=ground-45-lift*.3,anX=cx+50,anY=ground-3,hdX=cx-80,hdY=ground-16;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(shX,shY);ctx.quadraticCurveTo(cx-20,shY-lift*.6,hiX,hiY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(hiX,hiY);ctx.lineTo(knX,knY);ctx.stroke();
      ctx.beginPath();ctx.moveTo(knX,knY);ctx.lineTo(anX,anY);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(anX,anY);ctx.lineTo(anX+15,anY);ctx.stroke();
      ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(shX+5,shY);ctx.lineTo(shX-10,ground-3);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(hdX,hdY,14,0,Math.PI*2);ctx.fill();
      if(lift>15){ctx.strokeStyle=`rgba(255,140,60,${(lift-15)/30})`;ctx.lineWidth=8;ctx.beginPath();ctx.arc(hiX-5,hiY+5,10,0,Math.PI);ctx.stroke();}
      if(lift>5){ctx.strokeStyle=`rgba(255,140,60,${lift/40})`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(hiX,hiY+20);ctx.lineTo(hiX,hiY-5);ctx.stroke();ctx.fillStyle=ctx.strokeStyle;ctx.beginPath();ctx.moveTo(hiX-5,hiY);ctx.lineTo(hiX,hiY-8);ctx.lineTo(hiX+5,hiY);ctx.fill();}
    }},
  { id:"clamshells", name:"Clamshells", phase:2, sets:"3 × 15 each side", freq:"1× daily",
    tip:"Keep feet together. Only the knee opens. Slow and controlled.",
    animate(ctx,t,w,h){
      const cx=w/2,ground=h*.75,oa=Math.max(0,Math.sin(t*1.8))*.6;
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      const hiX=cx,hiY=ground-25,shY=ground-80,hdY=ground-108;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(hiX,hiY);ctx.lineTo(cx,shY);ctx.stroke();
      const bkx=hiX+40,bky=hiY+10,bax=bkx-10,bay=hiY+45;
      ctx.strokeStyle="#b0a898";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(hiX,hiY);ctx.lineTo(bkx,bky);ctx.lineTo(bax,bay);ctx.stroke();
      const tkx=hiX+40*Math.cos(oa),tky=hiY-40*Math.sin(oa)+5;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(hiX,hiY-3);ctx.lineTo(tkx,tky);ctx.lineTo(bax,bay-5);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(cx,hdY,14,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx,shY);ctx.lineTo(cx+20,shY+25);ctx.stroke();
      if(oa>.1){ctx.strokeStyle=`rgba(255,140,60,${oa})`;ctx.lineWidth=2;ctx.setLineDash([3,3]);ctx.beginPath();ctx.arc(hiX,hiY,25,-.1,-oa,true);ctx.stroke();ctx.setLineDash([]);}
    }},
  { id:"calf-raises", name:"Calf Raises", phase:2, sets:"3 × 15 reps", freq:"1× daily",
    tip:"3 seconds up, 3 seconds down. Both feet. Hold at the top.",
    animate(ctx,t,w,h){
      const cx=w/2,ground=h*.82,rise=Math.max(0,Math.sin(t*1.4))*18;
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      const ay=ground-5-rise,ky=ay-55,hy=ky-55,sy=hy-65,hdy=sy-28;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(cx-8,ay);ctx.lineTo(cx-5,ky);ctx.lineTo(cx,hy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+8,ay);ctx.lineTo(cx+5,ky);ctx.lineTo(cx,hy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,hy);ctx.lineTo(cx,sy);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx,sy);ctx.lineTo(cx-18,hy+10);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx,sy);ctx.lineTo(cx+18,hy+10);ctx.stroke();
      ctx.lineWidth=4;
      if(rise>5){ctx.beginPath();ctx.moveTo(cx-8,ay);ctx.lineTo(cx-10,ground-2);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+8,ay);ctx.lineTo(cx+10,ground-2);ctx.stroke();}
      else{ctx.beginPath();ctx.moveTo(cx-8,ay);ctx.lineTo(cx-20,ground-2);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+8,ay);ctx.lineTo(cx+20,ground-2);ctx.stroke();}
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(cx,hdy,14,0,Math.PI*2);ctx.fill();
      if(rise>8){ctx.strokeStyle=`rgba(255,140,60,${(rise-8)/15})`;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(cx-5,ky+15);ctx.lineTo(cx-7,ay-5);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+5,ky+15);ctx.lineTo(cx+7,ay-5);ctx.stroke();}
    }},
  { id:"hamstring-curls", name:"Prone Hamstring Curls", phase:2, sets:"3 × 12 reps", freq:"1× daily",
    tip:"Lie face down. Curl slowly against gravity. Add ankle weight to progress.",
    animate(ctx,t,w,h){
      const cx=w/2,ground=h*.7,curl=Math.max(0,Math.sin(t*1.6))*1.2;
      ctx.strokeStyle="#555";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx-110,ground);ctx.lineTo(cx+80,ground);ctx.stroke();
      const hdX=cx-85,hdY=ground-16,shX=cx-60,shY=ground-8,hiX=cx+10,hiY=ground-5;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(shX,shY);ctx.lineTo(hiX,hiY);ctx.stroke();
      ctx.strokeStyle="#b0a898";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(hiX,hiY);ctx.lineTo(hiX+90,ground-3);ctx.stroke();
      const knX=hiX+55,knY=ground-4,sl=45,anX=knX-Math.sin(curl)*sl,anY=knY-Math.cos(curl)*sl;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(hiX,hiY);ctx.lineTo(knX,knY);ctx.lineTo(anX,anY);ctx.stroke();
      const fa=curl+.3;ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(anX,anY);ctx.lineTo(anX-Math.sin(fa)*12,anY-Math.cos(fa)*12);ctx.stroke();
      ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(shX,shY);ctx.lineTo(hdX+10,hdY+5);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(hdX,hdY,14,0,Math.PI*2);ctx.fill();
      if(curl>.3){ctx.strokeStyle=`rgba(255,140,60,${curl/1.5})`;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(hiX+10,hiY+2);ctx.lineTo(knX-5,knY);ctx.stroke();}
    }},
  { id:"single-leg-balance", name:"Single-Leg Balance", phase:3, sets:"3 × 30 sec", freq:"1× daily",
    tip:"Start eyes open. Progress to eyes closed, then a soft surface (pillow).",
    animate(ctx,t,w,h){
      const cx=w/2,ground=h*.82,sw=Math.sin(t*2.5)*3,asw=Math.sin(t*3)*8;
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      const ax=cx+sw,ay=ground-5,ky=ay-55,hy=ky-55,sy=hy-65,hdy=sy-28;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+sw*.3,ky);ctx.lineTo(cx+sw*.5,hy);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax+18,ground-2);ctx.stroke();ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax-8,ground-2);ctx.stroke();
      const rkx=cx+sw*.5+25,rky=hy+20,rax=rkx-5,ray=rky+30;
      ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(cx+sw*.5,hy);ctx.lineTo(rkx,rky);ctx.lineTo(rax,ray);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+sw*.5,hy);ctx.lineTo(cx+sw*.7,sy);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx+sw*.7,sy);ctx.lineTo(cx-35+asw,sy+10);ctx.stroke();
      ctx.beginPath();ctx.moveTo(cx+sw*.7,sy);ctx.lineTo(cx+35-asw,sy+5);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(cx+sw*.8,hdy,14,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="rgba(255,140,60,0.4)";ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(cx,ground+12);ctx.lineTo(cx,ground-180);ctx.stroke();ctx.setLineDash([]);
    }},
  { id:"terminal-knee-ext", name:"Terminal Knee Extensions", phase:3, sets:"3 × 15 reps", freq:"1× daily",
    tip:"Band behind knee. Straighten from ~30° to full. Squeeze quad at end.",
    animate(ctx,t,w,h){
      const cx=w/2,ground=h*.82,ext=(Math.sin(t*1.8)+1)/2,kb=.5-ext*.5;
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      const ancX=cx-60,ancY=ground-55,hy=ground-120,knX=cx,knY=ground-55,sl=50;
      const anX=knX+Math.sin(kb)*sl,anY=knY+Math.cos(kb)*sl;
      ctx.strokeStyle="rgba(255,80,80,0.6)";ctx.lineWidth=3;ctx.setLineDash([6,3]);ctx.beginPath();ctx.moveTo(ancX,ancY);ctx.lineTo(knX-3,knY);ctx.stroke();ctx.setLineDash([]);
      ctx.strokeStyle="#b0a898";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx-10,hy);ctx.lineTo(cx-15,knY);ctx.lineTo(cx-18,ground-3);ctx.stroke();
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(cx,hy);ctx.lineTo(knX,knY);ctx.lineTo(anX,anY);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(anX,anY);ctx.lineTo(anX+15,anY);ctx.stroke();
      ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(cx,hy);ctx.lineTo(cx,hy-65);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx,hy-60);ctx.lineTo(cx-15,hy-30);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,hy-60);ctx.lineTo(cx+15,hy-30);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(cx,hy-85,14,0,Math.PI*2);ctx.fill();
      if(ext>.6){ctx.strokeStyle=`rgba(255,140,60,${(ext-.6)*2})`;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(cx+3,hy+10);ctx.lineTo(knX+2,knY-5);ctx.stroke();}
    }},
  { id:"step-ups", name:"Step-Ups", phase:3, sets:"3 × 10 each leg", freq:"1× daily",
    tip:"Use a low platform (15–20 cm). Push through the heel. Control the descent.",
    animate(ctx,t,w,h){
      const ground=h*.82,cx=w/2,cycle=(t*.8)%(Math.PI*2),phase=cycle/(Math.PI*2);
      ctx.strokeStyle="#3a3a3a";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(20,ground);ctx.lineTo(w-20,ground);ctx.stroke();
      const sH=25,sW=50,sX=cx-10;
      ctx.fillStyle="#444";ctx.fillRect(sX-sW/2,ground-sH,sW,sH);
      let bY,ffY,bfY;
      if(phase<.4){const p=phase/.4,e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;bY=ground-sH-e*80;ffY=ground-sH-2;bfY=ground-2-e*sH;}
      else if(phase<.5){bY=ground-sH-80;ffY=ground-sH-2;bfY=ground-sH-2;}
      else if(phase<.9){const p=(phase-.5)/.4,e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;bY=ground-sH-80+e*80;ffY=ground-sH-2;bfY=ground-sH-2+e*sH;}
      else{bY=ground-80;ffY=ground-sH-2;bfY=ground-2;}
      const hy=bY+35,sy=bY-30,hdy=sy-28;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(cx,hy);ctx.lineTo(cx-3,(hy+ffY)/2);ctx.lineTo(cx-5,ffY);ctx.stroke();
      ctx.strokeStyle="#b0a898";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx,hy);ctx.lineTo(cx+10,(hy+bfY)/2+5);ctx.lineTo(cx+12,bfY);ctx.stroke();
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(cx,hy);ctx.lineTo(cx,sy);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx,sy);ctx.lineTo(cx-18,sy+35);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,sy);ctx.lineTo(cx+18,sy+35);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(cx,hdy,14,0,Math.PI*2);ctx.fill();
    }},
  { id:"prone-hang", name:"Prone Hang (Extension)", phase:"daily", sets:"3 × 3 min holds", freq:"1× daily",
    tip:"Critical for maintaining full extension before surgery. Let gravity do the work.",
    animate(ctx,t,w,h){
      const cx=w/2,bedY=h*.5,gs=Math.sin(t*.8)*2;
      ctx.fillStyle="#444";ctx.fillRect(cx-120,bedY,140,8);
      const hdX=cx-80,hdY=bedY-10,shX=cx-55,shY=bedY-4,hiX=cx-5,hiY=bedY-2,knX=cx+15,knY=bedY+2;
      ctx.strokeStyle="#e8dcc8";ctx.lineWidth=5;ctx.lineCap="round";
      ctx.beginPath();ctx.moveTo(shX,shY);ctx.lineTo(hiX,hiY);ctx.lineTo(knX,knY);ctx.stroke();
      const anX=knX+10+gs,anY=knY+55+gs;
      ctx.beginPath();ctx.moveTo(knX,knY);ctx.lineTo(anX,anY);ctx.stroke();
      ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(anX,anY);ctx.lineTo(anX+5,anY+12);ctx.stroke();
      ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(shX,shY);ctx.lineTo(hdX+10,hdY+5);ctx.stroke();
      ctx.fillStyle="#e8dcc8";ctx.beginPath();ctx.arc(hdX,hdY,14,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle="rgba(255,140,60,0.5)";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(anX+20,knY+15);ctx.lineTo(anX+20,anY+5);ctx.stroke();
      ctx.fillStyle="rgba(255,140,60,0.5)";ctx.beginPath();ctx.moveTo(anX+15,anY);ctx.lineTo(anX+20,anY+10);ctx.lineTo(anX+25,anY);ctx.fill();
      ctx.fillStyle="rgba(255,140,60,0.6)";ctx.font="11px monospace";ctx.fillText("gravity",anX+28,anY-5);
    }}
];

const phaseColors = { "2":"#4a9eff", "3":"#ff8c3c", "daily":"#66bb6a" };
let activeId = null;
let currentFilter = "all";
const animations = {};

function render() {
  const container = document.getElementById("exercises");
  container.innerHTML = "";
  const filtered = currentFilter === "all" ? exercises : exercises.filter(e => String(e.phase) === currentFilter);

  filtered.forEach(ex => {
    const card = document.createElement("div");
    card.className = "card" + (activeId === ex.id ? " active" : "");

    const pc = phaseColors[String(ex.phase)] || "#888";
    const pl = ex.phase === "daily" ? "Keep daily" : "Phase " + ex.phase;

    card.innerHTML = `
      <div class="card-header">
        <h3>${ex.name}</h3>
        <span class="phase-badge" style="background:${pc}22;color:${pc}">${pl}</span>
      </div>
      <div class="canvas-wrap"><canvas width="240" height="180"></canvas></div>
      <div class="meta"><span>${ex.sets}</span><span class="sep">|</span><span>${ex.freq}</span></div>
      <p class="tip">${ex.tip}</p>
    `;

    card.addEventListener("click", () => {
      if (activeId === ex.id) { activeId = null; } else { activeId = ex.id; }
      // Stop all animations
      Object.keys(animations).forEach(k => { cancelAnimationFrame(animations[k]); delete animations[k]; });
      render();
    });

    container.appendChild(card);

    const canvas = card.querySelector("canvas");
    const ctx = canvas.getContext("2d");

    if (activeId === ex.id) {
      const start = performance.now();
      function loop(now) {
        const t = (now - start) / 1000;
        ctx.clearRect(0, 0, 240, 180);
        ex.animate(ctx, t, 240, 180);
        animations[ex.id] = requestAnimationFrame(loop);
      }
      animations[ex.id] = requestAnimationFrame(loop);
    } else {
      ex.animate(ctx, 0.5, 240, 180);
    }
  });
}

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    Object.keys(animations).forEach(k => { cancelAnimationFrame(animations[k]); delete animations[k]; });
    render();
  });
});

render();
</script>
</body>
</html>
